<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <title>TaskFlow</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="content-wrapper">
            <header class="navbar">
                <h1>TaskFlow</h1> 
                <a class="btn" href="perfil.html">Perfil</a>        
            </header>
            <main class="hero">
                <h2 class="page-title">Checklist: <span class="listname">To do list</span></h2>
                <ul class="task-list">
                    <li class="task-item custom-checkbox non-set">
                        <span class="list-item-number">001 - </span>
                        <label for="item1">
                            <input type="checkbox" name="item" id="item1">
                            <span class="checkmark"></span>
                            <input type="text">
                            <button class="submit-btn" href="#">Add</button>
                        </label>
                    </li>
                    <li class="task-item add-item">
                        <a href="#">+ Item</a>
                    </li>
            </main>
        </div>
    </body>
</html>
