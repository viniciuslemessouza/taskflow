<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <title>TaskFlow</title>
        <link rel="stylesheet" href="css/global.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="content-wrapper">
            <header class="navbar">
                <h1>TaskFlow</h1> 
                <a class="btn" href="login.html">Login</a>        
            </header>
            <main class="hero">
                <form class="postit recovery-postit">
                    <h2>Password Recovery</h2>
                    <div>
                        <label for="email">Email:</label>
                        <input id="email" type="email">
                    </div>
                    <div>
                        <label class="desabled code-timeout">
                            Resend email in <span class="countdown">60</span>s
                        </label>
                    </div>
                    <div>
                        <span></span>
                        <button class="submit-btn">Send</button>
                    </div>
                </form>
            </main>
        </div>
    </body>
</html>
