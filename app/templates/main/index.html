{% extends 'main/layout.html' %}
{% block content %}
    <div class="hello-message">
        <h2>Your digital notebook for productivity</h2>
        <p>Write, manage and complete your tasks in a simple and intuitive way.</p>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('notebooks.get_notebooks') }}">Start writing</a>
        {% else %}
            <a href="{{ url_for('users.login') }}">Start writing</a>
        {% endif %}
    </div>
{% endblock content %}
