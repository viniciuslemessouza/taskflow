{% extends 'main/layout.html' %}
{% block content %}
    <form class="post-it login-form" method="POST" action="" novalidate>
        {{ form.hidden_tag() }}
        <div class="form-row">
            {{ form.email.label }} <span>:</span> {{ form.email }}
            {% if form.email.errors %}
                <div class="validation-errors-popup">
                    {% for error in form.email.errors %}
                        <span class="validation-error">{{ error }}</span>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
        <div class="form-row">
            {{ form.submit }}
        </div>
    </form>
{% endblock content %}
