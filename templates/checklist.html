{% extends 'layout.html' %}
{% block content %}
<div class="list-header editing">
    <h2 class="page-title">To do list</h2>
    <div class="header-icons">
            <button class="material-symbols-outlined edit-icon" alt="edit list" herf="#">edit</button>
            <button class="material-symbols-outlined confirm-icon" alt="confirm list" herf="#">check</button>
            <button class="material-symbols-outlined delete-icon" alt="delete list" herf="#">delete</button>
        </div>
    </div>
    <ul class="task-list editing">
        <li class="task-item set">
            <p><span class="list-item-number">001</span> - </p>
            <form action="">
                <label class=custom-checkbox for="item1">
                    <input type="checkbox" name="item" id="item1">
                    <span class="checkmark"></span>
                    <input type="text"  placeholder="Take the trash out">
                </label>
            </form>
            <button class="material-symbols-outlined submit-btn remove-item" href="#">remove</button>
        </li>
        <li class="task-item set">
            <p><span class="list-item-number">002</span> - </p>
            <form action="">
                <label class=custom-checkbox for="item2">
                    <input type="checkbox" name="item" id="item2">
                    <span class="checkmark"></span>
                    <input type="text"  placeholder="Stroll with the dog">
                </label>
            </form>
            <button class="material-symbols-outlined submit-btn remove-item" href="#">remove</button>
        </li>
        <li class="task-item non-set">
            <p><span class="list-item-number">003</span> - </p>
            <form action="">
                <label class=custom-checkbox for="item1">
                    <input type="checkbox" name="item" id="item1">
                    <span class="checkmark"></span>
                    <input type="text"  placeholder="Type the task">
                </label>
            </form>
            <button class="material-symbols-outlined submit-btn add-item" href="#">add</button> 
        </li>
    </ul>
{% endblock content %}
